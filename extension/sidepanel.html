<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #0a0a1a 0%, #141428 100%);
    color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px 16px;
    overflow-y: auto;
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h2 {
    font-size: 20px; font-weight: 700; color: #fff;
    letter-spacing: -0.5px;
  }
  .header .sub {
    font-size: 12px; color: #666; margin-top: 4px;
  }

  /* Mic button */
  .mic-container { position: relative; margin-bottom: 24px; }

  #mic {
    width: 100px; height: 100px; border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #1e1e3a, #0e0e1e);
    border: 2px solid #2a2a4a;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; cursor: pointer; transition: all 0.3s ease;
    user-select: none; position: relative; z-index: 1;
  }
  #mic:hover { border-color: #ef4444; transform: scale(1.03); }

  #mic.active {
    border-color: #ef4444;
    box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
  }
  #mic.active::after {
    content: ''; position: absolute; inset: -6px;
    border-radius: 50%; border: 2px solid rgba(239, 68, 68, 0.4);
    animation: ring-pulse 2s ease-out infinite;
  }

  #mic.speaking {
    border-color: #34d399;
    box-shadow: 0 0 30px rgba(52, 211, 153, 0.3);
  }
  #mic.speaking::after {
    content: ''; position: absolute; inset: -6px;
    border-radius: 50%; border: 2px solid rgba(52, 211, 153, 0.4);
    animation: ring-pulse 1.5s ease-out infinite;
  }

  @keyframes ring-pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  #status {
    font-size: 13px; color: #888; text-align: center;
    min-height: 20px; margin-bottom: 16px;
    transition: color 0.3s;
  }
  #status.error { color: #ef4444; }
  #status.active { color: #34d399; }

  /* Prompt chips */
  #prompts {
    width: 100%; max-width: 320px;
    margin-bottom: 20px;
  }
  #prompts p { font-size: 11px; color: #555; margin-bottom: 8px; text-align: center; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip {
    padding: 6px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.05); border: 1px solid #2a2a4a;
    font-size: 11px; color: #999; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .chip:hover {
    background: rgba(239, 68, 68, 0.1); border-color: #ef4444;
    color: #fff;
  }

  /* Transcript */
  #transcript {
    width: 100%; max-width: 320px;
    flex: 1; overflow-y: auto;
  }
  .t-entry {
    padding: 8px 12px; margin: 4px 0; font-size: 12px;
    line-height: 1.5; border-radius: 12px;
  }
  .t-entry.user {
    background: rgba(239, 68, 68, 0.1);
    margin-left: 40px; text-align: right; color: #ccc;
  }
  .t-entry.agent {
    background: rgba(255,255,255,0.05);
    margin-right: 40px; color: #e0e0e0;
  }
  .t-entry.tool {
    background: transparent; font-size: 10px; color: #555;
    margin: 2px 0; text-align: center; font-style: italic;
  }

  /* Audio visualizer (simple) */
  .viz {
    display: flex; gap: 3px; align-items: center;
    justify-content: center; height: 24px; margin-bottom: 8px;
  }
  .viz .bar {
    width: 3px; background: #ef4444; border-radius: 2px;
    transition: height 0.1s;
  }
  .viz.speaking .bar { background: #34d399; }

  .powered {
    margin-top: auto; padding-top: 16px;
    font-size: 10px; color: #333;
  }
  .powered a { color: #ef4444; text-decoration: none; }
</style>
</head>
<body>
  <div class="header">
    <h2>🎙️ Voice Browser</h2>
    <p class="sub">Talk to an AI that controls your browser</p>
  </div>

  <div class="viz" id="viz">
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:4px"></div>
    <div class="bar" style="height:4px"></div>
  </div>

  <div class="mic-container">
    <div id="mic" onclick="toggleVoice()">🎤</div>
  </div>

  <div id="status">tap to start</div>

  <div id="prompts">
    <p>try saying:</p>
    <div class="chips">
      <span class="chip">"What's on this page?"</span>
      <span class="chip">"Open the top story"</span>
      <span class="chip">"Read the comments"</span>
      <span class="chip">"Search for AI posts"</span>
      <span class="chip">"Write a funny comment"</span>
    </div>
  </div>

  <div id="transcript"></div>

  <div class="bottom-bar">
    <span>powered by <a data-href="https://webfuse.com" onclick="window.open(this.dataset.href,'_blank')">webfuse</a> + <a data-href="https://livekit.io" onclick="window.open(this.dataset.href,'_blank')">livekit</a></span>
    <a class="clone-btn" data-href="https://github.com/hummer-netizen/extension-livekit-mcp" onclick="window.open(this.dataset.href,'_blank')">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      clone it
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
